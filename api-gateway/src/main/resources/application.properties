
server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=trainer-service
spring.cloud.gateway.routes[1].uri=lb://trainer-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/trainers/**

spring.cloud.gateway.routes[2].id=membership-service
spring.cloud.gateway.routes[2].uri=lb://MEMBERSHIP-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/memberships/**

spring.cloud.gateway.routes[3].id=booking-service
spring.cloud.gateway.routes[3].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/bookings/**



# Enable discovery locator
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true




